<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">    

    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" type="image/jpg" href="./images/sunrise.svg"/>
    <title>Weather App</title>
</head>
<body>
    <header class="container">
        <img class="logo" src="./images/sunrise.svg">
        <nav>
            <ul class="list">
                <li class="temp"><a class="nav--links" href="index.html">Temperature</a></li> 
                <li class="aqi"><a class="nav--links" href="aqi.html">AQI</a></li>
                <li class="uv"><a class="nav--links" href="uv.html">UV Index</a></li>
                <li class="know-more"><a class="nav--links" href="know.html">Know More</a></li>
            </ul>
        </nav>
    </header>

    <div class="des">
        <div class="uv-form">
            <form class="uv-form1" onsubmit="return false">
                <h1>UV Index is currently unavailable</h1>
                <h3>We will mail you when it will be available</h3>
                <label>First Name:</label><input type="text" placeholder="First Name" class="name" required><br>
                <span class="name_class warn"></span><br><br>
                <label>Last Name:</label><input type="text" placeholder="Last Name" class="last-name" required><br>
                <span class="lastname_class warn"></span><br><br>
                <label>Email id:</label> <input type="email" placeholder="Email id" class="email" required><br>
                <span class="email_class warn"></span><br><br>
                <!-- <input type="submit" value="Submit" class="sub"> -->
                <button class="sub" type="submit">Submit</button>
            </form>
        </div>
    </div>
    <script src="./scripts/uvscript.js"></script>
</body>
</html>
